# KIK-Starter (Rhadix-editie) — lokale ontwikkelstack
# Start:  docker compose up -d --build
services:
  db:
    image: postgres:16-alpine
    container_name: kik-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kik
      POSTGRES_PASSWORD: kik
      POSTGRES_DB: kik_starter
    volumes:
      - kik_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kik -d kik_starter"]
      interval: 5s
      timeout: 5s
      retries: 5

  fuseki:
    image: stain/jena-fuseki:5.1.0
    container_name: kik-fuseki
    restart: unless-stopped
    environment:
      ADMIN_PASSWORD: kik-admin
      FUSEKI_DATASET_1: kik
      JVM_ARGS: -Xmx512m
    volumes:
      - kik_fuseki:/fuseki
    ports:
      - "3030:3030"

  backend:
    build: ./backend
    container_name: kik-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      fuseki:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://kik:kik@db:5432/kik_starter
      FUSEKI_URL: http://fuseki:3030
      FUSEKI_DATASET: kik
      KIK_ENV: development
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"

  frontend:
    build: ./frontend
    container_name: kik-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:80"

volumes:
  kik_pgdata:
    name: kik_pgdata
  kik_fuseki:
    name: kik_fuseki
